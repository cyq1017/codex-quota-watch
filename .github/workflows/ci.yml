name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  readiness:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install agent
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Run readiness checks
        env:
          PYTHON_DOTENV_DISABLED: "1"
        run: |
          # CI validates the private collaboration branch history. For a public
          # single-commit release branch, run scripts/check-public-ready.sh
          # against that publish branch manually before changing visibility.
          STRICT_HISTORY=0 scripts/check-public-ready.sh HEAD
