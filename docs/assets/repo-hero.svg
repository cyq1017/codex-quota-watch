<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Codex Quota repository hero</title>
  <desc id="desc">A clear overview showing a Mac agent syncing Codex quota data through iPhone to Apple Watch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.52" stop-color="#101820"/>
      <stop offset="1" stop-color="#15130E"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2FE66A"/>
      <stop offset="1" stop-color="#9BE22E"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFCA1A"/>
      <stop offset="1" stop-color="#FF9F0A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="54" y="54" width="1172" height="532" rx="34" fill="#0D1117" stroke="#26313A" stroke-width="2"/>

  <g transform="translate(112 120)">
    <rect x="0" y="0" width="92" height="92" rx="22" fill="#F4F1EA"/>
    <path d="M22 68 A34 34 0 1 1 70 68" fill="none" stroke="url(#green)" stroke-width="9" stroke-linecap="round"/>
    <path d="M32 35 L50 46 L32 57" fill="none" stroke="#11151A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="57" x2="72" y2="57" stroke="#11151A" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="150" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="800">Codex Quota</text>
    <text x="2" y="198" fill="#AEB8C2" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500">Codex quota on Apple Watch</text>
    <text x="2" y="252" fill="#D9E2EA" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">Mac Agent -> iPhone setup -> Watch dashboard</text>
    <g transform="translate(0 306)">
      <rect x="0" y="0" width="122" height="42" rx="21" fill="#15251C" stroke="#2FE66A" stroke-opacity="0.5"/>
      <text x="22" y="28" fill="#61F38A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">Codex</text>
      <rect x="138" y="0" width="160" height="42" rx="21" fill="#1C2229" stroke="#3A4652"/>
      <text x="160" y="28" fill="#D9E2EA" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">Watch-only v1</text>
      <rect x="314" y="0" width="180" height="42" rx="21" fill="#1C2229" stroke="#3A4652"/>
      <text x="336" y="28" fill="#D9E2EA" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">Xcode tutorial</text>
    </g>
  </g>

  <g transform="translate(646 120)" filter="url(#shadow)">
    <rect x="0" y="74" width="222" height="160" rx="20" fill="#161C23" stroke="#33404A" stroke-width="2"/>
    <rect x="22" y="100" width="178" height="16" rx="8" fill="#2A333C"/>
    <rect x="22" y="130" width="138" height="16" rx="8" fill="#2A333C"/>
    <rect x="22" y="174" width="78" height="18" rx="9" fill="#2FE66A"/>
    <text x="32" y="224" fill="#AEB8C2" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Mac Agent</text>

    <path d="M245 154 H336" stroke="#52606C" stroke-width="4" stroke-linecap="round"/>
    <path d="M336 154 l-14 -10 v20 z" fill="#52606C"/>

    <rect x="358" y="42" width="154" height="280" rx="30" fill="#11161C" stroke="#38444F" stroke-width="3"/>
    <rect x="378" y="78" width="114" height="40" rx="12" fill="#202933"/>
    <rect x="378" y="136" width="114" height="18" rx="9" fill="#2FE66A"/>
    <rect x="378" y="166" width="84" height="18" rx="9" fill="#FFCA1A"/>
    <rect x="378" y="210" width="114" height="48" rx="14" fill="#192129" stroke="#34414D"/>
    <text x="386" y="291" fill="#AEB8C2" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">iPhone</text>

    <path d="M535 154 H614" stroke="#52606C" stroke-width="4" stroke-linecap="round"/>
    <path d="M614 154 l-14 -10 v20 z" fill="#52606C"/>

    <rect x="636" y="0" width="224" height="360" rx="62" fill="#050708" stroke="#3B4650" stroke-width="4"/>
    <rect x="658" y="30" width="180" height="300" rx="42" fill="#000000"/>
    <text x="684" y="88" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="800">Codex</text>
    <text x="684" y="142" fill="#35E86D" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="800">5h</text>
    <text x="778" y="142" fill="#35E86D" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="800">91%</text>
    <rect x="684" y="158" width="132" height="14" rx="7" fill="url(#green)"/>
    <rect x="684" y="212" width="132" height="14" rx="7" fill="url(#yellow)"/>
    <text x="684" y="200" fill="#FFCA1A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="800">7d</text>
    <text x="778" y="200" fill="#FFCA1A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="800">18%</text>
    <rect x="684" y="250" width="132" height="48" rx="14" fill="#11161C" stroke="#2D3742"/>
    <text x="706" y="281" fill="#D9E2EA" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">today tokens</text>
  </g>
</svg>
